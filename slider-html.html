<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carrusel Interactivo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

  <style>
    body {
      margin: 0;
      background-color: #000;
      font-family: sans-serif;
      color: white;
    }

    .hero {
      text-align: center;
      padding: 3rem 1rem 1rem;
    }

    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
    }

    .hero p {
      font-size: 1.1rem;
      opacity: 0.8;
    }

    .carousel-container {
      position: relative;
      max-width: 100%;
      height: 85vh;
      overflow: hidden;
    }

    .swiper {
      height: 100%;
    }

    .swiper-slide {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      transition: transform 0.6s ease-in-out;
    }

    /* Fondo con blur dinámico */
    .slide-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(30px);
      opacity: 0.25;
      z-index: 0;
      transition: background-image 0.3s ease-in-out;
    }

    .swiper-slide-active .slide-image,
    .swiper-slide-active .multi-image img {
      animation: zoomInFade 0.8s ease-in-out forwards;
    }

    .swiper-slide-active .multi-image img:nth-child(2) { animation-delay: 0s; }
    .swiper-slide-active .multi-image img:nth-child(1),
    .swiper-slide-active .multi-image img:nth-child(3) { animation-delay: 0.15s; }

    .swiper-slide-active .caption {
      animation: captionIn 0.8s ease-in-out forwards;
    }

    .slide-image,
    .multi-image img {
      max-height: 70vh;
      max-width: 90%;
      object-fit: contain;
      z-index: 1;
      border-radius: 16px;
      opacity: 0;
      filter: blur(4px);
    }

    .multi-image {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      z-index: 1;
    }

    .caption {
      margin-top: 1rem;
      color: white;
      z-index: 2;
      background-color: rgba(0, 0, 0, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      text-align: center;
      opacity: 0;
      filter: blur(4px);
      box-shadow: none;
    }

    .caption a {
      color: #ef801a;
      text-decoration: underline;
    }

    .swiper-button-next,
    .swiper-button-prev {
      color: white;
    }

    @keyframes zoomInFade {
      0% { opacity: 0; transform: scale(0.95); filter: blur(4px); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }

    @keyframes captionIn {
      0% { opacity: 0; filter: blur(4px); }
      100% { opacity: 1; filter: blur(0); }
    }
  </style>
        <script src="/js/posthog-init.js"></script>
        <script src="/js/posthog-tracking.js"></script>

    </head>
<body>

  <div class="hero">
    <h1>Nuestros Diseños</h1>
    <p>Explorá una selección de trabajos visuales con interacción y cuidado en cada detalle.</p>
  </div>

  <div class="carousel-container">
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">

        <!-- Slide 1 -->
        <div class="swiper-slide" data-bg="https://framerusercontent.com/images/OCXlv1afdy5HVpefp1iFzRttZ5g.webp">
          <div class="slide-bg"></div>
          <img src="https://framerusercontent.com/images/1A5TwMQqy6eu2zXfMjEC21Vazo.webp" class="slide-image" alt="Diseño 1">
          <div class="caption">Diseño 1 — <a href="#">Ver más</a></div>
        </div>

        <!-- Slide 2 -->
        <div class="swiper-slide" data-bg="https://framerusercontent.com/images/OCXlv1afdy5HVpefp1iFzRttZ5g.webp">
          <div class="slide-bg"></div>
          <img src="https://framerusercontent.com/images/OCXlv1afdy5HVpefp1iFzRttZ5g.webp" class="slide-image" alt="Diseño 2">
          <div class="caption">Exploración de color</div>
        </div>

        <!-- Slide 3 -->
        <div class="swiper-slide" data-bg="https://framerusercontent.com/images/W45WOhWurU74LzVF7XD9UNoCqz8.webp">
          <div class="slide-bg"></div>
          <img src="https://framerusercontent.com/images/W45WOhWurU74LzVF7XD9UNoCqz8.webp" class="slide-image" style="max-width: 60%;" alt="Diseño centrado">
          <div class="caption">Diseño centrado y destacado</div>
        </div>

        <!-- Slide 4 -->
        <div class="swiper-slide" data-bg="https://framerusercontent.com/images/TKfBfznt8tzG49Uo49iyGza3pQQ.webp">
          <div class="slide-bg"></div>
          <div class="multi-image">
            <img src="https://framerusercontent.com/images/TKfBfznt8tzG49Uo49iyGza3pQQ.webp" alt="Img1">
            <img src="https://framerusercontent.com/images/TKfBfznt8tzG49Uo49iyGza3pQQ.webp" alt="Img2">
            <img src="https://framerusercontent.com/images/TKfBfznt8tzG49Uo49iyGza3pQQ.webp" alt="Img3">
          </div>
          <div class="caption">Galería interna de concepto — <a href="#">Ver más</a></div>
        </div>

        <!-- Slide 5 -->
        <div class="swiper-slide" data-bg="https://framerusercontent.com/images/OCXlv1afdy5HVpefp1iFzRttZ5g.webp">
          <div class="slide-bg"></div>
          <img src="https://framerusercontent.com/images/OCXlv1afdy5HVpefp1iFzRttZ5g.webp" class="slide-image" alt="Diseño 5">
          <div class="caption">Prototipo funcional — <a href="#">Ver más</a></div>
        </div>

        <!-- Slide 6 -->
        <div class="swiper-slide" data-bg="https://framerusercontent.com/images/OCXlv1afdy5HVpefp1iFzRttZ5g.webp">
          <div class="slide-bg"></div>
          <img src="https://framerusercontent.com/images/OCXlv1afdy5HVpefp1iFzRttZ5g.webp" class="slide-image" alt="Diseño 6">
          <div class="caption">Moodboard creativo</div>
        </div>

      </div>

      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const swiper = new Swiper(".mySwiper", {
      loop: true,
      autoplay: {
        delay: 6000,
        disableOnInteraction: false,
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
      effect: "fade",
      fadeEffect: { crossFade: true },
      speed: 800,
      grabCursor: true,
      slidesPerView: 1,
      on: {
        slideChangeTransitionStart: () => {
          const slides = document.querySelectorAll('.swiper-slide');
          slides.forEach(slide => {
            const bg = slide.querySelector('.slide-bg');
            if (bg && slide.dataset.bg) {
              bg.style.backgroundImage = `url('${slide.dataset.bg}')`;
            }
          });
        }
      }
    });

    // Inicializar el fondo en la carga
    document.querySelectorAll('.swiper-slide').forEach(slide => {
      const bg = slide.querySelector('.slide-bg');
      if (bg && slide.dataset.bg) {
        bg.style.backgroundImage = `url('${slide.dataset.bg}')`;
      }
    });
  </script>

</body>
</html>
